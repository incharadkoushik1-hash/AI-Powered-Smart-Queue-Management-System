camera:
  source: 0
  width: 1280
  height: 720
  fps: 30

detection:
  model_path: "yolov8n.pt"
  confidence: 0.5
  classes:
    - 0

queue:
  roi_points:
    - [200, 150]
    - [1080, 150]
    - [1080, 570]
    - [200, 570]
  max_threshold: 10
  min_threshold: 3
  history_size: 100
  avg_service_time: 120

shelves:
  - id: 1
    name: "Shelf A"
    bbox: [50, 100, 400, 200]
    category: "beverages"
  - id: 2
    name: "Shelf B"
    bbox: [450, 100, 800, 200]
    category: "snacks"
  - id: 3
    name: "Shelf C"
    bbox: [50, 250, 400, 350]
    category: "dairy"
  - id: 4
    name: "Shelf D"
    bbox: [450, 250, 800, 350]
    category: "frozen"

shelf_detection:
  enabled: true
  low_threshold: 30
  empty_threshold: 10
  scan_interval: 10

alerts:
  led_enabled: true
  buzzer_enabled: true
  alert_duration: 2

server:
  host: "0.0.0.0"
  port: 5000
  debug: false

recommendations:
  staff_per_5_people: 1
  max_queue_per_staff: 5
  current_staff: 2
